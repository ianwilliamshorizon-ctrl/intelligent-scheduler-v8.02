name: Deploy Development

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build:dev

      - name: Deploy to Firebase Hosting
        # Note: If you want to deploy Cloud Functions/Rules as well, remove '--only hosting'
        run: npx firebase-tools deploy --only hosting --project dev --token "${{ secrets.FIREBASE_TOKEN_DEV }}"
