name: Deploy Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.16.0
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install Functions Dependencies
        run: npm ci --prefix functions

      - name: Build Application
        run: npm run build:brookspeed

      - name: Create Unique Build Timestamp
        run: echo "$(date)" > dist/build-timestamp.txt

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_PROD }}'
          create_credentials_file: true

      - name: Deploy to Firebase (Hosting & Functions)
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
        run: npx -y firebase-tools@15.11.0 deploy --project prod --only hosting,functions:generatecontent,functions:geminiGenerateContent,functions:synthesizeSpeech,functions:transcribeSpeech,functions:sendEmail,functions:sendBackupPasswordResetEmail,functions:inboundEmailWebhook,functions:getUsersList,functions:debugInquiry,functions:triggerEmailSync,functions:forceSyncAttachments --non-interactive --force
