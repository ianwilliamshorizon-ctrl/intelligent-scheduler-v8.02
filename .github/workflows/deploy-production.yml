name: Deploy Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install Functions Dependencies
        run: npm ci --prefix functions

      - name: Build Application
        run: npm run build:brookspeed

      - name: Create Unique Build Timestamp
        run: echo "$(date)" > dist/build-timestamp.txt

      - name: Deploy to Firebase (Hosting & Functions)
        run: npx firebase-tools deploy --project prod --token "${{ secrets.FIREBASE_TOKEN_PROD }}" --force
